services:
  - type: web
    name: asesor-colombia
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: UVT_VIGENTE
        value: "52669"
      - key: SMLMV_VIGENTE
        value: "1750905"
